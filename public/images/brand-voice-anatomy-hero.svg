<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 420" width="1120" height="420" style="background:#fbf9f5">
  <defs>
    <style>
      .label { font-family: 'Space Mono', 'Courier New', monospace; font-size: 9px; fill: #50A38C; letter-spacing: 0.12em; text-transform: uppercase; }
      .sublabel { font-family: 'Space Mono', 'Courier New', monospace; font-size: 7.5px; fill: #777777; letter-spacing: 0.08em; }
      .tick-label { font-family: 'Space Mono', 'Courier New', monospace; font-size: 6.5px; fill: #9a988f; letter-spacing: 0.06em; }
      .piece-outline { fill: #ffffff; stroke: #6D9EEB; stroke-width: 1.5; }
      .piece-outline-accent { fill: #ffffff; stroke: #AD623B; stroke-width: 1.5; }
      .dashed-seam { fill: none; stroke: #AD623B; stroke-width: 1; stroke-dasharray: 4 3; opacity: 0.7; }
      .connector { fill: none; stroke: #6D9EEB; stroke-width: 0.75; stroke-dasharray: 3 4; opacity: 0.5; }
      .notch { fill: #fbf9f5; stroke: #6D9EEB; stroke-width: 1.5; }
      .notch-accent { fill: #fbf9f5; stroke: #AD623B; stroke-width: 1.5; }
      .tick { stroke: #ddd8cc; stroke-width: 1; }
      .grain-arrow { fill: none; stroke: #9a988f; stroke-width: 1; }
    </style>
  </defs>

  <!-- Measurement tick border along top edge -->
  <line x1="40" y1="22" x2="1080" y2="22" stroke="#ddd8cc" stroke-width="0.75"/>
  <line x1="40" y1="18" x2="40" y2="26" class="tick"/>
  <line x1="160" y1="18" x2="160" y2="26" class="tick"/>
  <line x1="280" y1="18" x2="280" y2="26" class="tick"/>
  <line x1="400" y1="18" x2="400" y2="26" class="tick"/>
  <line x1="520" y1="18" x2="520" y2="26" class="tick"/>
  <line x1="640" y1="18" x2="640" y2="26" class="tick"/>
  <line x1="760" y1="18" x2="760" y2="26" class="tick"/>
