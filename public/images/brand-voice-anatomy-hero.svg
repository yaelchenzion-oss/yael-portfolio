  <text x="921" y="218" class="label" text-anchor="middle">Check</text>
  <text x="921" y="232" class="sublabel" text-anchor="middle">Self-Audit Checklist</text>
  <text x="921" y="250" class="tick-label" text-anchor="middle">CUT 1</text>

