  <line x1="868" y1="118" x2="890" y2="118" stroke="#ddd8cc" stroke-width="1"/>
  <line x1="868" y1="130" x2="890" y2="130" stroke="#ddd8cc" stroke-width="1"/>
  <line x1="868" y1="142" x2="890" y2="142" stroke="#ddd8cc" stroke-width="1"/>
  <line x1="868" y1="154" x2="890" y2="154" stroke="#ddd8cc" stroke-width="1"/>
  <line x1="894" y1="106" x2="972" y2="106" stroke="#ddd8cc" stroke-width="0.75" opacity="0.4"/>
  <line x1="894" y1="118" x2="972" y2="118" stroke="#ddd8cc" stroke-width="0.75" opacity="0.4"/>
  <line x1="894" y1="130" x2="972" y2="130" stroke="#ddd8cc" stroke-width="0.75" opacity="0.4"/>
  <line x1="894" y1="142" x2="972" y2="142" stroke="#ddd8cc" stroke-width="0.75" opacity="0.4"/>
  <line x1="894" y1="154" x2="972" y2="154" stroke="#ddd8cc" stroke-width="0.75" opacity="0.4"/>
